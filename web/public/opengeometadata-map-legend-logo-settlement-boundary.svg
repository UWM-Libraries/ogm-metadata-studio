    <path d="M56 86h16" stroke="#fffdf3" stroke-width="4"/>
  </g>

  <g clip-path="url(#red-circle)" fill="none" stroke="#fffdf3" stroke-linecap="square">
    <path d="M184 43v58M165 64h38" stroke-width="8"/>
    <path d="M164 86v20M154 96h20M204 86v20M194 96h20" stroke-width="5"/>
