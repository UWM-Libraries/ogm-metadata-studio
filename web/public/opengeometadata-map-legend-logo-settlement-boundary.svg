<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">OpenGeoMetadata map legend logo variation: settlement and boundaries</title>
  <desc id="desc">A Bauhaus grid logo using historic map legend symbols: school flag, church and cemetery crosses, bench mark, and county boundary lines.</desc>
  <defs>
    <clipPath id="yellow-square"><rect x="32" y="32" width="80" height="80"/></clipPath>
    <clipPath id="red-circle"><circle cx="184" cy="72" r="40"/></clipPath>
    <clipPath id="blue-triangle"><path d="M72 144 32 224h80z"/></clipPath>
    <clipPath id="black-square"><rect x="144" y="144" width="80" height="80"/></clipPath>
  </defs>
  <rect width="256" height="256" fill="#fffdf3"/>
  <rect x="32" y="32" width="80" height="80" fill="#f6d94d"/>
  <circle cx="184" cy="72" r="40" fill="#d52b1e"/>
  <path d="M72 144 32 224h80z" fill="#0057b8"/>
  <rect x="144" y="144" width="80" height="80" fill="#111111"/>

  <g clip-path="url(#yellow-square)" fill="none" stroke="#111111" stroke-linecap="square" stroke-linejoin="miter">
    <rect x="50" y="74" width="28" height="24" fill="#111111" stroke="none"/>
    <path d="M82 98V50" stroke-width="6"/>
