<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">OpenGeoMetadata map legend logo variation: survey control</title>
  <desc id="desc">A Bauhaus grid logo using historic map survey symbols: triangulation station, control disk, bench mark, and township grid.</desc>
  <defs>
    <clipPath id="yellow-square"><rect x="32" y="32" width="80" height="80"/></clipPath>
    <clipPath id="red-circle"><circle cx="184" cy="72" r="40"/></clipPath>
    <clipPath id="blue-triangle"><path d="M72 144 32 224h80z"/></clipPath>
    <clipPath id="black-square"><rect x="144" y="144" width="80" height="80"/></clipPath>
  </defs>
  <rect width="256" height="256" fill="#fffdf3"/>
  <rect x="32" y="32" width="80" height="80" fill="#f6d94d"/>
  <circle cx="184" cy="72" r="40" fill="#d52b1e"/>
  <path d="M72 144 32 224h80z" fill="#0057b8"/>
  <rect x="144" y="144" width="80" height="80" fill="#111111"/>

  <g clip-path="url(#yellow-square)" fill="none" stroke="#111111" stroke-linecap="square" stroke-linejoin="miter">
    <path d="M72 46 46 98h52z" stroke-width="6"/>
    <path d="M72 58v40M52 78h40" stroke-width="4"/>
    <circle cx="72" cy="78" r="4" fill="#111111" stroke="none"/>
  </g>

  <g clip-path="url(#red-circle)" fill="none" stroke="#fffdf3" stroke-linecap="square">
    <circle cx="184" cy="72" r="23" stroke-width="7"/>
    <path d="M184 44v56M156 72h56" stroke-width="6"/>
    <path d="M166 54h36M166 90h36" stroke-width="4"/>
    <circle cx="184" cy="72" r="5" fill="#111111" stroke="none"/>
  </g>

  <g clip-path="url(#blue-triangle)" fill="none" stroke="#fffdf3" stroke-linecap="square" stroke-linejoin="miter">
    <path d="M72 158 48 210h48z" stroke-width="6"/>
    <path d="M72 174v24M60 186h24" stroke-width="6"/>
    <circle cx="72" cy="186" r="4" fill="#fffdf3" stroke="none"/>
    <text x="72" y="207" fill="#fffdf3" stroke="none" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700">BM</text>
  </g>

  <g clip-path="url(#black-square)" fill="none" stroke="#fffdf3" stroke-linecap="square">
    <path d="M160 152v64M184 152v64M208 152v64M152 160h64M152 184h64M152 208h64" stroke-width="4"/>
    <path d="M152 152h24M152 152v24" stroke-width="8"/>
    <circle cx="160" cy="160" r="3" fill="#fffdf3" stroke="none"/>
    <circle cx="184" cy="184" r="3" fill="#fffdf3" stroke="none"/>
    <circle cx="208" cy="208" r="3" fill="#fffdf3" stroke="none"/>
  </g>
</svg>
