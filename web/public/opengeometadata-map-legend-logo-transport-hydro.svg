    <clipPath id="blue-triangle"><path d="M72 144 32 224h80z"/></clipPath>
    <clipPath id="black-square"><rect x="144" y="144" width="80" height="80"/></clipPath>
  </defs>
  <rect width="256" height="256" fill="#fffdf3"/>
